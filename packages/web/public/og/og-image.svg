    <line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" />
    <line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" />
    <line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" />
    <line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="1200" y1="0" x2="1200" y2="630" />
    <line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="360" x2="1200" y2="360" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="480" x2="1200" y2="480" />
    <line x1="0" y1="540" x2="1200" y2="540" />
  </g>

  <!-- Glow bar -->
  <rect x="0" y="290" width="1200" height="50" fill="url(#glow)" />

  <!-- Lobster emoji -->
  <text x="600" y="220" text-anchor="middle" font-size="80">>�</text>

  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="52" fill="#FF6B35">
    better-openclaw
  </text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#9CA3AF">
    Build your OpenClaw superstack
  </text>

  <!-- Feature pills -->
  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">
    <rect x="280" y="420" width="120" height="32" rx="16" fill="#FF6B35" fill-opacity="0.12" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="1" />
    <text x="340" y="441" text-anchor="middle" fill="#FF6B35">CLI Tool</text>

    <rect x="430" y="420" width="130" height="32" rx="16" fill="#FF6B35" fill-opacity="0.12" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="1" />
    <text x="495" y="441" text-anchor="middle" fill="#FF6B35">REST API</text>

    <rect x="590" y="420" width="120" height="32" rx="16" fill="#FF6B35" fill-opacity="0.12" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="1" />
    <text x="650" y="441" text-anchor="middle" fill="#FF6B35">Web UI</text>

    <rect x="740" y="420" width="170" height="32" rx="16" fill="#FF6B35" fill-opacity="0.12" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="1" />
    <text x="825" y="441" text-anchor="middle" fill="#FF6B35">56+ Services</text>
  </g>

  <!-- Bottom domain -->
  <text x="600" y="560" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="400" font-size="16" fill="#4B5563">
    better-openclaw.dev
  </text>

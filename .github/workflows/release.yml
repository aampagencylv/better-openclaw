name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release to NPM
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | sed -E 's/^chore\(release\): ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Expected semver (x.y.z)"
            exit 1
          fi

      - name: Check if version already exists
        id: check-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view create-better-openclaw@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on NPM"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --local user.email "bachir@bidew.io"
          git config --local user.name "bidew.io"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push --tags
          else
            echo "Tag v$VERSION already exists, skipping"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check-version.outputs.exists == 'false'

      - uses: actions/setup-node@v4
        if: steps.check-version.outputs.exists == 'false'
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm build

      - name: Run tests
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm test

      - name: Update package versions
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in packages/core packages/cli; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp.json && mv tmp.json $pkg/package.json
          done

      - name: Create GitHub Release
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release create "v$VERSION" --generate-notes
          else
            echo "Release v$VERSION already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Core to NPM
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm publish --filter @better-openclaw/core --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # - name: Publish MCP to NPM
      #   if: steps.check-version.outputs.exists == 'false'
      #   run: pnpm publish --filter @better-openclaw/mcp --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to NPM
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm publish --filter create-better-openclaw --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release Summary
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v$VERSION Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [@better-openclaw/core@$VERSION](https://www.npmjs.com/package/@better-openclaw/core/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
          # echo "- [@better-openclaw/mcp@$VERSION](https://www.npmjs.com/package/@better-openclaw/mcp/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "- [create-better-openclaw@$VERSION](https://www.npmjs.com/package/create-better-openclaw/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "[v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY

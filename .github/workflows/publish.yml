name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint --filter create-better-openclaw

      - run: pnpm typecheck --filter create-better-openclaw

      - run: pnpm test --filter create-better-openclaw

      - run: pnpm build --filter create-better-openclaw

      - name: Publish CLI to npm
        run: pnpm publish --filter create-better-openclaw --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
